name: indexing-monitor

# Triggered per-client from the Vercel dashboard via workflow_dispatch.
# Both inputs are required — the Vercel API creates the Supabase `runs` row,
# then dispatches the workflow so this runner only has to stream progress.
on:
  workflow_dispatch:
    inputs:
      client_id:
        description: 'Supabase clients.id to run (e.g. "msplaunchpad")'
        required: true
        type: string
      run_id:
        description: 'Supabase runs.id (UUID) created by the /api/run endpoint'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  # Prevent two runs for the same client from stomping on each other. Queued
  # runs for different clients are still allowed to proceed in parallel.
  group: indexing-monitor-${{ inputs.client_id }}
  cancel-in-progress: false

jobs:
  run:
    name: Indexing run (${{ inputs.client_id }})
    runs-on: ubuntu-latest
    # 285-URL sitemaps at ~0.5–1s/URL inspect + sequential submits push past 20m;
    # bump to 60m so a full sitemap run can finish without GHA cancelling it.
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r engine/requirements.txt

      - name: Run indexing engine
        env:
          SUPABASE_URL:             ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET:          ${{ secrets.SUPABASE_SECRET }}
          GOOGLE_CREDENTIALS:       ${{ secrets.GOOGLE_CREDENTIALS }}
          MAX_SUBMISSIONS_PER_RUN:  ${{ vars.MAX_SUBMISSIONS_PER_RUN || '180' }}
          MAX_SUBMIT_ATTEMPTS_PER_URL: ${{ vars.MAX_SUBMIT_ATTEMPTS_PER_URL || '5' }}
          PYTHONIOENCODING:         utf-8
          PYTHONUTF8:               '1'
        run: python -m engine.runner "${{ inputs.client_id }}" "${{ inputs.run_id }}"
