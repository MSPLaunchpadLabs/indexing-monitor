name: indexing-monitor

on:
  # Daily schedule disabled on 2026-04-22 — run manually only.
  # To re-enable, uncomment the schedule block below.
  # schedule:
  #   - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  monitor:
    name: Daily indexing check
    runs-on: ubuntu-latest
    # Generous cap — typical runs finish in 1–2 minutes.
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore indexing.db from previous runs so the 48h cooldown, URL
      # history, and `is_new` diffing all survive across days. The unique
      # key per run_id guarantees we always save a fresh copy at the end;
      # restore-keys matches the most recent previous save.
      - name: Restore/save indexing.db cache
        uses: actions/cache@v4
        with:
          path: indexing.db
          key: indexing-monitor-db-${{ github.run_id }}
          restore-keys: |
            indexing-monitor-db-

      - name: Run indexing-monitor
        env:
          SITEMAP_URL:        ${{ secrets.SITEMAP_URL }}
          GSC_SITE_URL:       ${{ secrets.GSC_SITE_URL }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python main.py run

      # Upload the daily CSV as a downloadable artifact. `if: always()` so
      # we still get the partial report even if the run failed mid-flow.
      - name: Upload daily report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: indexing-report-${{ github.run_id }}
          path: reports/
          if-no-files-found: ignore
          retention-days: 30
